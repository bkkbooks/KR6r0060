front:
  text: 僧史略序贊寧姓高氏其先渤海人出家杭之祥符習南山律著述毗尼時謂律虎賜號明義宗文太平興國三年太宗聞其名召對滋福殿延問彌日更賜通慧敕住右街天壽寺命修僧史又詔修大宋高傳三十卷及三教聖賢事迹一百卷又著內典集一百五十卷外學集四十九卷內翰王禹儞作文集序極其贊美至道中示寂崇寧四年加諡圓明如僧傳排韻第二十四引釋聞正統第三佛祖通載第十八稽古略第三惟夫作者以博達之資列事物興廢者凡五十九條以示諸新學可謂千載趙璧矣從事佛乘者誰得不仰餘光乎然而本書但有慶長舊板一本而已流行亦甚寡矣頒典教社諸士竊慨歎之將改刻弘于世囑豫以校訂豫也拙陋豈能得盡之乎哉苟有不可者則待後鑑適為寒鄉乏書者揭作者略傳併為此之序時治治十六年四月佛生日沙門行誡識于三緣山山房重開僧史略序佛書所載地獄鬼畜北俱盧州長壽天佛前佛後生便盲聾瘖啞世智辨聰不信毀謗佛法僧者名八難處又曰八無暇蓋生其處者障難深重無暇修心不知正法長劫驅驅輪回不息故也是知世聰俗慧不達佛書則理昧正真事同盲聵矜伐衒耀自為已能沮善詆僧佛所不救生遭貶謫死入阿鼻違逆皇天招延世亂皆此輩也致亂皆因蠧善具載佛書本朝王內翰禹儞生平著述排詆釋氏雖唐韓退之吾宋歐永叔佛書所謂天魔波旬闡提外道無以加也間遇英傑之僧亦心重之余嘗讀王公偊儞文集有贈僧録通慧學公詩曰詔修僧史浙江濱萬卷書中老一身赴闕尚騎支遁馬援毫應待仲尼麟溟濛雪彩松窗曉狼籍苔花竹院春還許幽齋暫相訪便令陶令滿衣塵其意竊比陶彭澤謁遠法師故事而自高之也歐陽文忠公亦録王內翰寧僧録元夜觀燈嘲謔之言有秦鄭不愛未坑之語王又述寧之墓志則有心慕誠服之意敘寧有文集一百七十卷見行於世王之毀僧破佛蜂蠆梟獍吠堯彈鳳天下皆知矣獨於通慧友愛相師賦詩述銘以褒美之何也蓋通慧學行才識兼類相求自相友愛耳且世諦文章未知其高下其於學佛明心博通大教王必不及也且夫釋氏橫闊勝大之言包羅法界洞徹鄰虛斷惑出纏冥真會聖永拋輪轉長挹愛河出萬劫之迷津脫四魔之見網歷劫災而不壞與虛空而並存與夫世文實霄壤矣佛之利見也應大機則重重華藏剎剎分形接小凡則丈六化身三千界主所以宣尼推為至聖老氏尊之竺乾吾師號佛覺一切民也溥天慈父覆育群倫超出世間之大聖人也孔老二聖豈妄推之蓋見善不及守雌保弱不敢為天下先之志也本朝駙馬都尉李度題寺詠佛詩曰仲尼推至聖老氏稱古皇天上及天下應更無比量勒碑于相國寺之東廡別院蓋佛者流光於混元之前列影向太虛之始慈雲法雨潤澤群生千聖樂推萬靈欣奉宜乎宣尼伯陽聞風而悅慕德而歸命焉唐李商隱贊曰吾儒之師曰魯仲尼仲尼師聃龍吾不知聃師竺乾善入無為稽首正覺吾師師師懿哉儒言知佛者也經不云乎除摩利支山不産栴檀木好語皆生佛法中佛未出時世諦幻法皆無名字佛之設教統應群機撮要而言不出乎真俗二諦其真也詮妙理之格言究死生之出要其濟俗也獎善罰惡罪福報應至於治世之書亦諸佛之遺化也故經曰一切世間安民濟物皆是諸佛法滅盡後有婆羅門採什佛書安置己典傳於後世大千國土各有典彛在天竺則四韋陀此土則五經三史之書也故曰一切法者皆是佛法豈徒言哉如今黃冠剽竊佛經撰成己教外道經書半偷佛法識者盡知矣唯寧師內外博通真俗雙究觀師所集物類相感志至於微術小伎亦盡取之蓋欲學佛遍知一切法也崇寧四年敕加命號曰東京左街僧録史館編修圓明通慧大師以旌其學行師之所著唯大宋高僧傳三十卷與僧史略三卷奉敕入藏頒行外餘多湮沒兵火之中得斯藏本佛法事理來歷紀綱捨此書而弗知也苟斯文之墜地顧大法之將沈由是敢率同袍興心內護爰有兩街僧録鑒義臨安府前後政僧官禪講同出長財命工鏤板附藏流通因寫王詩歐公之録以示方來使知世智辨聰之流有時而信焉三教之賢聖理歸一揆則八無暇之沈淪尚可救也故為序之紹興十四年甲子四月己巳如來誕聖日傳西天三藏法特賜寶覺圓通法濟大師法道序大宋僧史略并序右街僧録通慧大師贊寧奉敕撰夫僧本無史覺乎弘明二集可非記言耶高名僧傳可非記事耶言事既全俱為載筆原彼東漢至于我朝僅一千年教法污隆緇徒出沒富哉事迹繁矣言詮蘊結藏中從何攸濟贊寧以太平興國初疊奉詔旨高僧傳外別修僧史及進育王塔乘馹到闕敕居東寺披覽多暇遂樹立門題搜求事類始乎佛生教法流衍至于三寶住持諸務事始一皆隱括約成三卷號僧史略焉蓋取裴子野宋略為目所恨刪采不周表明多昧不可鴻碩寓目預懼缺然者爾
