body:
  text: 右街僧録通慧大師贊寧奉敕撰二十四道俗立制二十五行香唱導二十六讚唄之由二十七僧寺綱紏二十八立僧正立尼正附二十九僧統三十沙門都統三十一左右街僧録三十二僧主副員三十三講經論首座三十四國師三十五雜任職員三十六僧主秩俸尼附三十七管屬僧尼祠部牒附三十八僧道班立三十九內道場生日道場附四十僧籍弛張道俗立制佛法流行隨時制斷合毗尼之繩紏則案毗尼堪別法之處量須循別法故佛訶比丘云巧避我制造種種過故許同時立方毗尼涅槃後立未來教以為律範所不圍篇科所不載則比附而求之也以是篇聚之外別有僧制焉今時比丘或住一林居一院皆和衆立條約束行止俾不罹於愆失也晉道安法師傷戒律之未全痛威儀之多缺故彌縫其闕埭堰其流立三例以命章使一時而生信一行香定座上講二六時禮懺三布薩等法過踰此法者則別立遮防安弟子法遇講化於荊州時有學徒飲酒遇罰而不遣安在襄陽聞之封小箠以寄遇遇詳師意集衆諭之令直日打遇二十撲封箠却還故習鑿齒與謝安書云安能肅衆上之三例天下翕然奉行也又支遁立衆僧集儀度慧遠立法社節度至于宣律師立鳴鐘軌度分五衆物儀章服儀歸敬儀此並附時傍教相次而出鑿空開荒則道安為僧制之始也後魏世宗宣武帝即位下詔曰緇素既分法律亦異道教彰於互顯禁勸各有所宜其僧犯殺人以上罪依俗格斷餘犯悉付昭玄以內律僧制判之景明年中帝新撰之時魏與梁通和要貴多遣人隨使交易唯崔暹字季倫寄求佛經梁祖繕寫并幡花讚唄送至館暹嘗命沙門明藏著佛論而已署名其好佛法為若此也先是僧尼猥濫暹奏設科條篇沙門法上為昭玄都以撿約之又南齊文宣王著僧制一卷又梁祖造光宅寺詔法雲為寺主創立僧制用為後範觀其北魏南朝俗施僧制而皆婉約且不淫傷由輕法之網羅有惡人之穿穴脫漏而墮不至誅刑之上其可得乎為僧者苟未修行但能避刑憲亦逍遙之上士也行香唱導香也者解穢流芬令人樂聞也原其周人尚臭冥合西域重香佛出姬朝遠同符契矣經中長者請佛宿夜登樓手秉香罏以達信心明日食時佛即來至故知香為信心之使也大遺教經曰比丘欲食先燒香唄讚之又經中蛇呼比丘自説宿緣令為懺悔并將仙提來取我行香此方教法既行經律散漫故安法師三例中第一是行香定座上講斯乃中夏行香之始也後魏及江表皆重散香且無沿革至唐高宗朝薛元起李義府奉敕為太子齋行香因禮奘三藏又中宗設無遮齋詔五品以上行香或用然香薰手或將香粖遍行謂之行香後不空三藏奏為高祖太宗七聖忌辰設齋行香敕旨宜依尋因多故不齋但行香而已文宗朝中書崔蠡上疏云國忌設齋百官行香事無經據伏請停廢敕曰崔蠡所奏遂遣討尋本末禮文令式曾不該明其兩京天下州府國忌於寺觀行香今後並宜停罷嘗試論之崔蠡言無經據者蛇之行香豈無經也安公引教設儀豈無據也敕云討尋本末禮文令式曾不該明者三代之禮何嘗言飯釋子而行香耶且令式唯是歷代沿革之法律如代宗後之條格豈標在隋末唐初之令式乎矧以禮出儒家詎可將釋書為據事因釋氏無宜用儒典為憑就體證之方云合理儒流不許還引儒書何異獄訟之人召親黨而作證若欲除廢其無辭乎夫孝子事祖考唯善是從徇葬不益於生生固宜寢也行香是薦於冥漠知無不為觀文宗薄於祖宗宜其寄坐矣或曰何必行香為通曰如周之尚臭燔柴血膋薌蕭言天歆其臭也天豈食血膋薌蕭之氣邪由人尚其臭故以臭而事天也若然者佛教重香寧可奪乎況百官行香代君也百官事祖宗亦臣子也苟欲廢之如忠孝何宣宗即位再興斯道大中五年敕京城及外州府國忌行香並須清潔不得携酒肉入寺烹炮既失嚴恪之心頗乖追薦之道云自此至于哀帝行香如舊朱梁廢唐七廟方止開平三年大明節百官入寺行香祝壽後還薦祖宗行香于今不絶晉天福五年竇貞固奏國忌宰臣跪爐百官列座今欲宰臣跪爐百官立班行香後飯僧百人永為常式宋大宗淳化三年虞部員外郎李宗訥奏國忌行香請宰臣已下行香後禁酒食表其精潔敕下御史臺依行唱導者始則西域上座凡赴請呪願曰二足常安四足亦安一切時中皆吉祥等以悅可檀越之心也舍利弗多辨才曾作上座讚導頗佳白衣大歡喜此為表白之椎輪也梁高僧傳論云夫唱導所貴其事四焉一聲也二辨也三才也四博也非聲則無以警衆非辨則無以適時非才則言無可采非博則語無依據此其大體也據寄歸傳中云焚香胡跪歎佛相好合是導師胡跪爾或直聲告或詰曲聲也又西域凡覲國王必有讚德之儀法流東夏其任尤重如見大官謁王者須一明練者通暄涼序情意讚風化此亦唱導之事也齊竟陵王有導文梁僧祐著齊主讚歎緣記及諸色呪願文陳隋世高僧真觀深善斯道有道文集焉從唐至今此法盛行于代也讚唄之由讚唄原始案十誦律中俱胝耳即億耳也作三契聲以讚佛其人善唄易了解阿含中善和羅作善諷誦令影勝大王象馬不行此土則康僧會傳泥洹讚唄支謙製連句梵唄又開士法勝善阿毗曇心別撰二百五偈以為要解號曰心其頌聲也撰象天樂若靈籥自發儀刑群品觸物有寄一吟一詠狀鳥步獸行也一弄一引類乎物情也情與類遷則聲隨九變而成歌氣與數合則五音協律而俱作附之金石則百獸率舞奏之管絃則人神同感斯乃窮音聲之妙會也魏子建嘗遊魚山而感音翻其曲折同合沙門之唄𠽋焉南齊竟陵王子良將經中偈契消息調音曲盡其妙著讚梵唄偈文一卷又帛法橋者尤善梵唄高僧傳中其人頗多此不具録後趙石勒建平年中有神降于安邑廳事諷詠經音七日方絶僧有摹寫為梵唄焉或曰梵唄之聲此何益也通曰一者佛道法樂也此音韻雖哀不傷雖樂不淫折中中和故為法樂也二者諸天鬼神聞皆歡喜故三者諸佛常法十方剎土何莫由斯樂也僧寺綱紏夫言寺者嗣也治事者相嗣續於其內也既用官司之名無虧佛事之業故子續其父資踰於師此相嗣而接蹤當克勤而成事也案西域知事僧總曰羯磨陀那譯為知事亦曰悅衆謂知其事悅其衆也稽其佛世飲光統衆於靈鷲身子涖事於竹林及沓婆摩羅年甫十六已證應真其後念身不牢固請為僧知事指夜出光分僧臥具故佛讚言我弟子為僧知房舍差次請食沓婆摩羅子為第一如其赴請群集誰合受第一水果飲食等佛言以其年臘最高者為之謂之上座及佛教東漸漢魏之間如網未設其綱如舟未下其磸殆姚秦之世出家者十室而半羅什入關贏糧裹足而至者三千秦主敕選道法師為僧正慧遠為悅衆法欽慧斌掌僧録給車輿吏力僧正秩同侍中餘則差降此土立僧官秦為始也立僧正僧曹創立淨衆曰齊所樹官方終循佛教所言僧正者何正政也自正正人克敷政令故云也蓋以比丘無法如馬無轡勒牛無貫繩漸染俗風將乖雅則故設有德望者以法而繩之令歸于正故曰僧正也此偽秦僧為始也或曰道䂮東晉遷都蔑聞此職至宋世乃立沙門都又以尼寶賢為僧正文帝孝武皆崇重之次有號法主者如釋道猷生公之弟子也文帝問慧觀曰頓悟義誰習之答曰道猷遂召入至孝武即位敕住新安寺為鎮寺法主又敕法瑗為湘宮寺法主詳其各寺同名疑非統正之任又升明中以法持為僧正大明中以道溫為都邑僧正永明中敕長干寺玄暢同法獻為僧主分任南北兩岸暢後被敕往三吳使紏繩二衆齊末以法悅為僧主住正覺寺梁祖歸心佛教深入玄樞慎選德人以充僧首則法超為都邑僧正普通六年敕法雲為大僧正吏力備足又慧令亦充此職焉大字異耳所云僧主者猶僧官也蓋偏地小正小統之名也如闍那崛多此言志德北印度人周朝譙王宇文儉鎮蜀請以同行至彼任益州僧主住龍淵寺焉南朝慧基姓偶錢塘人依求那三藏於蔡州受戒後化行越土尋敕為僧主掌任十城東土僧主之始也東土即吳會之間也歷觀諸朝多是諸侯立僧正也梁雖大國亦用此名但加大字以別之今天下每州置一員擇德行才能者充之不然則闕矣尼正附北朝立制多是附僧南土新規別行尼正宋太始二年敕尼寶賢為尼僧正又以法淨為京邑尼都維那此則承乏之漸梁陳隋唐少聞其事偏之國往往聞有尼統尼正之名焉僧統帝王奄宅寰區必革人視聽或更其禮樂或變以官司互納言作尚書以太蔚代司馬何常之有以此為初秦制關中立僧正為宗首魏尊北土改僧統領緇徒雖發新題亦提舊職後魏皇始中趙郡沙門法果戒行精至開演法籍太祖徵為沙門統言多允愜供施甚厚太宗崇信彌加於前永興中前後授輔國宜城子忠信侯又安城公皆固讓之俗官加僧初聞於此帝幸其居嫌其門狹不容輿輦更廣大之年八十餘卒帝三臨其喪追贈老壽將軍趙郡胡靈公今贈老壽將軍皆出此時之敕知前輔國必是將軍胡靈二字諡也初法果年十四始出家有子曰猛詔令襲果所加爵沙門統之官自法果始也復有罽賓沙門師賢本是王種東遊涼土又來京下值罷佛法權假醫術而守道不改於重興日即為沙門同輩五人魏帝親為下髮詔賢為僧統僧統之官自師賢始也隋興佛道變革周風召僧猛住大興善寺為隋國大統猛姓假涇陽人也講般若十地等隋以大字為珠異也又號聖沙彌者初在洛任國僧都都即沙門都也後召入鄴綏緝有功轉為國統一國之僧統也宋沿唐制廢統立録惟宮人出家敕補尼録尼統有至十字師名比兩國邑號者甚衆沙門都統魏主移都仍從元姓虜家所服悉變華章又於竺梵之門多事改遷之作孝文帝一日下詔曰門下近得録公等表知早定沙門都統比考德選賢寤寐勤心繼佛之任莫知誰寄或有道高年尊理無縈紆或有器識沖邈高揖塵務今以思遠寺主法師僧顯可敕為沙門都統詳究魏文帝敕曇曜為沙門都統乃自曜公始也曜即帝禮為師號昭玄沙門都統欣佛法重興雕石造像譯淨土三昧經并付法藏傳等是此師也齊則以法上為昭玄統法順為沙門都然都者雖總轄之名九官曹多以都字為其總攝也而降統一等也又烏萇國僧那提黎耶舍隋言尊稱先於齊國亦為昭玄統也高齊之世何統與都多耶答曰時置十員一統一都為正為副故多也大隋受命亦用統名始以曇延為沙門大昭玄統別加大字次則靈藏法師為大興善寺主尋署昭玄都唐穆宗元和元年閏正月以龍興寺僧惟英充翰林待詔兼兩街僧統英通結中外假卜筮惑人故有是命尋以非宜罷之自爾朱梁後唐晉漢周洎今大宋皆用録而無統矣偏諸道或有私署如吳越以令因為僧統後則繼有避僭差也尋降稱僧正其僭偽諸國皆自號僧録焉左右街僧録左右街自起置功德使所屬及置僧録還用左右街也僧置録以録之功德又各轄焉自唐有天下初則佛法萎遲蓋李教勃興物無兩大故也傳奕上疏條釋氏之愆神堯不無其惑次巡幸東洛太宗詔令僧尼班于道後高宗御極議欲令拜君親則天歸心釋門還令僧班道上中睿之世微更發揮玄宗之朝一往崇道僧寺止立三綱而已昭玄統正革而不沿僧務官方沈而弗舉道宣律師被敕為西明寺上座即其例也至文宗開成中始立左右街僧録尋其人即端甫法師也俗姓趙德宗召入禁中與儒道論議賜紫方袍令侍太子於東朝順宗重之若兄弟相與臥起恩禮特深憲宗數辛其院待之若賓友掌內殿法儀録左街僧事標表淨衆一十年即元和中也由此觀之僧録之起自端甫也甫公文宗開成中卒開成後則雲端為僧録也端公奉敕旨欲芟夷釋氏先下詔曰有佛教來自古迄今興廢有何徵應仰兩街僧録與諸三學僧録其事目進上成推法寶大師玄暢序述編次暢遂撰三寶五運圖明佛法傳行年代若費長房開皇三寶録同也次則宣宗朝靈晏辨章為僧録同奏請千鉢大教王經入藏章晏二公受僧録見五運圖大中八年詔修廢總持寺敕三教首座辨章專勾當修寺護軍中尉驃騎王元宥宣章公由首座充左街僧録次淨光大師僧徹充右街僧録懿宗咸通十二年十一月十四日延慶節兩街僧道赴麟德殿講論右街僧録彥楚賜明徹大師左街僧録清蘭賜慧照大師僖宗朝則有覺暉為僧録焉中和巢寇犯闕時僧録雲皓與道門威儀杜光庭執香罏案等隨駕蒼黃穿襪行至武功腳皆創疼及收復京師隨回方署録職莫知于時僧道引駕儀式持香案何耶所言録者有晉宋録録其經法傍教傳翻譯人物等事故魏詔曰近得録公等表録公乃是僧曹總録猶言録事也偽秦始立僧正則以法欽慧斌二人掌僧録也有唐變態正乃錯諸録則用矣蓋禮樂自天子出也時既所高物無我競任使魏統如草秦正若林皆歸唐録區宇中矣譬若尚賢尚齒屬尚賢之代齒何用乎尚白尚青當尚白之君青勿先也僧主副員姚秦立正也雖無副正之名而有二車之意故用慧遠為悅衆欽斌二公掌録斯乃階級分曹同成僧務而不顯言副正二字及魏世更名僧統以為正員署沙門都以分副翼則都維那是也故孝文帝詔云副儀二事緇素攸同頃因曜統獨濟遂廢斯任知曇曜前曾立副職今欲毗德贊善固須其人皇舅寺法師僧義行恭神暢溫聰謹正業懋道優用膺副翼可充都維那以光賢徒乃知魏以悅衆為副例知姚秦世慧遠為副也若爾者後魏亦用秦制而僧傳不指蓋不明練辭義耳又于時各寺別立三官寺之都維那莫有相濫乎答此有二不濫一敕署令於昭玄僧統不為副二自帶昭玄下都維那豈同寺之悅衆耶南朝宋孝武帝重慧璩璩曾對帝唱導於齋會中嚫璩一萬敕為京邑都維那此以京邑二字簡異也江左立正而有立副者有不立者及隋一統還準北朝用統為正以都為副至唐元和長慶間始立僧録録左右街僧亦無二職次有三教首座昭宗乾寧中改首座為副僧録得覺暉焉副録自暉公始也朱梁後唐晉漢周或置或省出沒不定今大宋太平興國六年敕立右街副僧録知右街教門事焉講經論首座首座之名即上座也居席之端處僧之上故曰也尋唐世敕辨章檢校修寺宣宗賞其功署三教首座元和中端甫止稱三教談論蓋以帝王誕節偶屬徵呼登內殿而讚揚對異宗而商榷故標三教之字未必該通六籍博綜二篇通本教之諸科控群賢而傑出而脫或遍善他宗原精我教對王臣而無畏挫執滯而有功膺于此名則無愧色矣次後經論之學或置首座三教首座則辨章為始也朱梁洎周或除或立悉謂隨時今大宋有講經講論首座乃僧録之外別立耳國師西域之法推重其人內外攸同正邪俱有昔尼犍子信婆羅門法國王封為國師內則學通三藏兼達五明舉國歸依乃彰斯號聲教東漸唯北齊有高僧法常初演毗尼有聲鄴下後講涅槃并受禪數齊王崇為國師國師之號自常公始也殆陳隋之代有天台知顗禪師為陳宣隋煬菩薩戒師故時號國師即無封署至則天朝神秀領徒荊州召入京師中睿玄四朝皆號為國師後有禪門慧忠肅代之時入宮禁中説禪觀法亦號國師元和中敕署知玄曰悟達國師若偏之國則蜀後主賜右街僧録光業為祐聖國師吳越稱德韶為國師江南唐國署文遂為國大導師也導師之名而含二義若法華經中商人白導師言此即引路指述也若唱導之師此即表白也故宋衡陽王鎮江陵因齋會無有導師請曇光為導及明帝設會見光唱導稱善敕賜三衣瓶鉢焉雜任職員寺之設也三綱立焉若網罟之巨綱提之則正故云也梵語摩摩帝悉替那羯磨那陀華言言寺主上座悅衆也詳其寺主起乎東漢白馬也寺既爰處人必主之于時雖無寺主之名而有知事之者至東晉以來此職方盛故侯景言以蕭衍老翁作太平寺主也後周則有陟岵寺主自敕封署隋有大興善寺主唐太平公主奏胡僧慧範為聖善寺主仍加三品封公爵則天以薛懷義為白馬寺主盡由敕補自餘諸道三年一代耳夫上座者有三種焉集異足毗曇云一生年為耆年二世俗財名與貴族如節度使劉綐出家物賜夏臘三先受戒及先證果此名最勝古今立此位皆取其年德幹局者充之高僧傳多云被敕為某寺上座是也道宣敕為西明寺上座列寺主維那之上五運圖中敕補者繼有之都維那者寄歸傳云華梵兼舉也維是綱維華言也那是略梵語刪去羯磨陀三字也魏孝文以皇舅寺僧義法師為京邑都維那則敕補也是乃昭玄都維那耳今寺中立者如玄暢敕為總持寺維那是地次典座者謂典主床座凡事舉座一色以攝之乃通典雜事也或立直歲則直一年或直月直半月直日皆悅衆也隨方立之都謂之三綱雜任其僧綱也唐初數葉不立僧主各寺設此三官而已至元和長慶間立左右街僧録總録僧尼或有事則先白録司後報官方也朱梁後唐晉漢周今大宋皆循曩制矣又宋齊之世曾立法主一員故道猷敕為新安寺鎮寺法主法瑗為湘宮寺法主至唐末多立受依止闍梨一員亦稱法主今朝秉律員位最高者號宗主亦同也依止闍梨或當敕補者蓋道俗之間有爭不分曲直告其剖斷令人息爭故號之也周隋之際有法導專精律範北齊主既敬法門五衆斯盛有犯律者令遵理之敕為斷事沙門時有青齊僧訟敕令斷之繁爭自弭至隋詔住大興善寺斷事之名遵統為始後升為統隋日嚴寺釋彥琮著僧官論必廣明僧職求本未獲耳僧主秩俸僧之少欲本合辭榮佛之軌儀止令分衛其如若無尊大禦下誠難或契宿因冥招檀信此又別時之意也故那爛陀寺有學通諸部者出入象乘齋食官供此方道寵日受黃金等自姚秦命僧為僧正秩同侍中此則公給食俸之始也洎魏孝文下歲施道人應統帛詔云應統仰紹前哲繼軌道門徵佇玄範沖猷是託今既讓俗名理宜別供可取八解之義歲施帛八百匹準四輩之貺隨四時而給又修善之本實依力命施食之因內典所美可依朝官上秩當月而施至於身後猶齋僧資薦僧官得時在孝文之世也唐代宗令度支具廩給內道場僧又唐祠部格道士通二篇給田三十畝僧通經業準上給田也論曰西域飲光糞衣紏衆北齊上統布服臨官或尚道情則凡愚者不畏或多豪富則忌剋者所謀吏力豈得不無俸財可宜多畜盜憎民惡負乘懷璧立加害己又損法門子曰與其奢也寧儉宜以道德悅服於人可矣尼附東晉何充始捨宅為寺安尼其間不無神異義解道明之者雄飛傑出矣宋寶賢為京邑尼僧正文帝四事供養孝武月給錢一萬尼正之俸寶賢始也管屬僧尼教傳東漢時歷魏朝信向未臻伽藍全少僧既有數事亦無多乃反前言則須關白關白何所還在鴻臚寺焉故知沙門始隸鴻臚也西晉無説後魏有云初立監福曹以統攝僧伍尋更為昭玄寺也故隋百官志曰昭玄寺掌佛教署大統一人統一人都維那三人置功曹主簿員以管諸州郡縣沙門矣後復改崇玄署焉梁僧祐云如今同文寺也因疑齊梁之世曾立同文寺以主僧務未見其文于時帶司呼官故曰昭玄大統至唐初窈無此謂僧尼皆隸司賓案會要云則天延載元年五月十五日敕天下僧尼隸祠部不須屬司賓知天后前係司賓也此乃隸祠部之始也義取其善攘惡福解災之謂也玄宗開元十四年中書門下奏僧尼割屬鴻臚寺從之一十五年正月敕僧尼令祠部撿挍道士女冠隸宗正寺蓋以李宗入皇籍也憲宗元和二年二月詔僧尼道士全隸左右街功德使自是司封祠部不復關奏會要曰大曆十四年敕內外功德使並宜停罷若然者代宗朝早置功德使但內外與左右街異耳元和中併司封祠部而置左右街功德使由吐突承璀纍立軍功故有此授僧道屬焉寶曆中護軍中尉劉規亦充此使至會昌五年廢寺像敕僧尼不宜隸祠部于時中書門下奏云奉宣僧尼不隸祠部合屬主客為仗令鴻臚寺收管宜分折奏來者天下僧尼國朝以來並隸鴻臚寺至天寶二年隸祠部與延載時不同臣等據大唐六典祠部掌天地宗廟大祀與僧事殊不相當又可務根本合歸尚書省隸鴻臚寺未為允當又六典主客掌朝貢之國七十餘蕃五天笠國並在數內釋氏出自天笠今陛下以其非中國之數已有釐革僧尼名籍便令係主客不隸祠部及鴻臚寺從之六年五月制僧尼依前令兩街功德使收管不要係主客其所度僧仍令祠部給牒宣宗重闡佛宗所度僧尼還屬左右街功德使故楊欽義充左街功德使宣使之捕道士趙歸真昭宗朝宰臣崔某奏誅宦官內諸司使一切停罷皆歸省寺功德使宰執帶之梁革唐命道士不入宗正僧尼還係祠部梁末帝龍德元年禁天下私度僧尼有願出家勒入京比試後祠部上請焉後唐無聞晉以揚光遠為天下功德使自維青不軌之後不置此使矣至今大宋僧道並隸功德使出家乞度策試經業則功德使關祠部出牒係于二曹矣論曰鴻臚寺之任禮四夷遠人也教法初來須就斯寺雖興白馬終隸此司古云僧尼係鴻臚寺者是也及乎嘗蒟醬以言美服皮靴而稍佳則曰四海一家王者無外故後魏置監福曹焉昭玄寺焉崇玄署焉設官布局以攝僧尼蒟醬而以生我土皮靴而認作華裝故唐朝勒歸祠部既而因事釐革逐朝廢興故立功德使以總之中宗時以沙門廓清為修功德使官至殿中監土突軍容軍功莫賞朝廷議以功德使榮之非謂專其僧道也于時尚書省司封先屬其中由是不出中官洎唐末行袁紹之誅職歸宰執皇朝盛重此職亦僧道之幸事也祠部牒附嘗聞僧視其官則五品然未見令式史傳明載且信相傳又曾見僧五品非官品也據其誦經合格就試得通此僧選也剃髮被袈裟此釋褐也敕授形俱無作戒法此官位也講三藏教充如來使也化導內外衆使背惡向善理民也為國行道保民無災為之課最也苟弗比其階品視其職官其可得乎將來法門君子對𫾻帝王請降明敕許比某官某品像末之時為美事之端自我之力不其善乎若夫稽其鄉貫則南朝有之見高僧傳唯為搜揚便生名籍係之限局必有憑由憑由之來即祠部牒也案續會要天寶六年五月制僧尼依前兩街功德使收管不要更隸主客其所度僧尼仍令祠部給牒唐祠部牒皆綾素錦素鈿軸蓋綸誥也非官何謂給牒自玄宗朝始也及德宗建中中敕天下僧尼身死還俗者當日仰三綱於本縣陳牒每月申州附朝集使申省并符誥同送者注毀其京城即於祠部陳牒納告告身即戒牒也僧道班位佛法通行朝代更歷未全鼎成則置而勿論及動時君則入宮見妬加以僧乘時而炫曜法因事而仳離乃與玄門抗衡角力因有諍故遂結朋黨由朋黨故遂生愛憎焉經中不許親近國王大臣王子等又云我法付囑王臣者何若以倚傍力輪苟不親近而可得乎若以招致殃咎苟欲榮身其可免乎觀其末代垢重情移奉身而已罕聞為教而觀近國王大臣也脫或唯居蘭若不履朝門誰強召呼誰分著定則何班位之有然以但思獨善專事杜多則王侯何以委知大力曷能扶翼故須分其表位廁其班行去取二情各有意致昔者教之東演也漢魏之世或曰渺茫晉宋以來頗聞烜赫若其玄玄之道老氏之風於漢魏時存亡而已何其知邪如馬遷作史將老子與韓非共傳可非漢代未崇重之乎夫立傳同科權其趣類相齊則史官列而偶出也是知伯陽之道前漢未光東漢桓帝方遣中官醮祀祈福魏黃初三年下敕曰告豫州刺史老聃賢人未宜先孔子不知魯郡為孔子立廟成未漢桓帝不師聖法正以嬖臣而事老子欲以求福良足笑也此祠之興由桓帝也武皇帝以老子賢人不毀其道朕亦以此亭當路往來者輒往瞻視而樓屋傾頓儻能壓人故令修整昨過視之殊整頓矣恐小人謂此為神妄往禱祀犯乎常禁宜宣告吏民咸使聞知由是觀之漢魏之間未露鋒穎至唐有羊角之現厥道攸興認作祖宗册為帝號此君謂為雄誰敢不雄若史遷在唐作傳必改為帝紀也以仲尼同傳猶謂鴻毛不敵鈞石也豈得韓非妄參廁邪漢魏之人覽馬史者豈驚駭乎驚駭不倫者近世之情也然則物隨黨別事逐時移預三恪者不免舊訛有萬邦者豈無新意朱梁革命敕改亳州太清宮為老子廟蓋由帝代無定愛憎不同釋氏雖西來客教自晉宋齊梁陳後魏北齊後周大隋僧班皆在黃冠之上梁武捨道不齒玄門黃冠之徒固難爭長唐貞觀十一年駕幸洛陽道士先有與僧論者聞之於太宗乃下詔曰今鼎祚克昌既憑上德之慶天下大定亦賴無為之功宜有解張闡茲玄化自今以後齋供行立至於稱謂道士女冠可在僧尼之上庶敦反本之俗暢於九有貽諸萬葉時京邑智寶上表陳諫不聽自此僧班在下矣至十五年帝幸弘福寺賜大德五人座曰朕宗李在先大德大應恨恨以宗先故朕見修功德不曾別造道觀皆崇寺宇也如此宣慰諸僧心皆喜躍及高宗朝有直東臺舍人憑神德上表請仍舊僧尼在道士前并依前不拜父母辭繁不録則天天授二年四月詔令釋教在道門之上僧尼處道士女冠之前睿宗景雲元年二月詔以釋典玄宗理均迹異拯人救俗教別功齊自今每緣法事集會僧尼道士女冠宜行並集此不分前後齊行東西也論曰周武輕棄我教若錙銖爾嘗御正殿量述三教以儒居先佛教居後道教最上由出於無名之前也近見沈公著聱書云唯聞二教不聞釋氏此皆侮聖人一言為阿鼻之種也故拓跋虎入冥具見周武受對并寄言隋天子為我拔苦文帝乃募天下出錢營福以救薦之且如佛無我所遭傷毀而無報復蓋以將欲殘害於彼必先燒熱於心心為苦因身嬰惡報自作自受可不畏乎昔阮孝緒著七録中以佛教為外篇一戒律二禪定三智慧四疑似五論記因目佛理為方外之篇號方外教自孝緒始也所言方外者同莊老也域中之教拘縶所不及也請以智眼照其淺深則內外上下自區別矣如無智眼以玉石俱焚薰蕕共器知復奈何緬思後周摧滅遇隋復興方謂熾然尋又微矣唐宗老氏釋教逶遲或抑拜君親或分班上下良以有為之法何免四相遷移譬如火焉火中寒暑乃退興久必替替極還興興替相尋未始有極景雲中令僧班在西道班在東齊行並進朱梁之世又移厥位今大宋每當朝集僧先道後並立殿廷僧東道西間雜副職若遇郊天則道左僧右未知始起也內道場內道場起於後魏而得名在乎隋朝何邪煬帝以我為古變革事多改僧寺為道場改道觀為方壇若內中僧事則謂之內道場也今朝茲福等殿安佛像經藏立剎聲鐘呼為內寺是也魏大武皇帝始光二年立至神道場神麚四年敕州鎮悉立道場蓋帝王生此日也尋文是生日權建法會耳後天元大成元年春正月詔曰隆建玄風三寶尊重宜修闡法化廣理可歸崇其舊沙門中德行清高者七人在政武殿西安置行道此內道場之始也南朝或以尼在內中持課又壽光殿中群僧法集或充學士或號講員或注解經文或敷揚禪要凡存禁中並內道場也唐則天令大德僧法處一慧儼行感宣政等在內道場念誦以薛懷義參雜其間則天又於洛京大內置內道場中宗睿宗此制無改代宗初喜祠祀未重釋氏而宰臣元載杜鴻漸王縉皆歸向佛僧王縉造寶應寺代宗嘗問福業報應事元載因而啓奏由是信之過甚常令僧百餘人於宮中陳佛像經教念誦謂之內道場供養甚貴出入乘廄馬度支具廩給每西蕃入寇必令群僧講誦仁王經以攘寇虜幸其退則加其錫賚不空三藏官至卿監封國公通籍禁中又詔天下官吏不得箠拽僧尼又七月望日於內道場造于蘭盆飾以金翠設高祖七廟神座各書神號識之迎出內陳於寺觀引道繁盛歲以為常至建中中德宗敕廣德永泰以來聚僧於禁中嚴設道場並令徹去遣出僧衆云順宗朝以端甫掌內殿法儀亦是此任憲宗穆宗文宗並端甫掌內殿法事也文宗大和九年四月二十六日敕停內長生殿道場武宗初年以生日德陽節却置內長生殿道場及設內齋僧道獻壽後與道士趙歸真惑亂切齒求僧之過至會昌四年詔停內齋及內道場惡意萌于此矣生日道場附生日為節名自唐玄宗始也魏太武帝始光二年立道場至神麚四年敕州鎮悉立道場慶帝生日始光中是帝自崇福之始也神麚中是臣下奉祝帝壽之始也自爾以來臣下吉祝必營齋轉經謂之生辰節道場于今盛行焉僧籍弛張夫得果之人且無限劑出家之士豈有司存既來文物之朝須設紏繩之任其有見優間而競入懼徭役以奔來輒爾冒名實非高士僧之內律豈能御其風牛佚馬邪故設僧局以綰之立名籍以紀之周隋之世無得而知唐來主張方聞附麗文宗大和四年正月祠部請天下僧尼冒名非正度者具名申省各給省牒以憑入籍時入申名者計七十萬造帳入籍自大和五年始也若然者前豈無籍帳邪監福曹昭玄寺崇玄署將何統斷僧務乎對曰勘造僧帳體度不同或逐寺總知或隨州別録或單名轉數或納牒改添故不同也然則出時君之好惡乃入籍之解張今大宋用周顯德條貫三年一造著于律令也
